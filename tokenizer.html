<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tokenizer Explorer - GenAI Fundamentals</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="hero">
  <h1><a href="index.html" style="text-decoration: none; color: inherit;">&larr;</a> Tokenizer Explorer</h1>
  <p>See how text gets broken into tokens &mdash; the basic units LLMs use to read and generate text.</p>
</div>

<div class="demo-section">
  <div class="demo-card">
    <textarea id="token-input" rows="3" placeholder="Type or paste text here...">Generative AI is rapidly transforming the digital landscape.</textarea>
    <div class="controls" style="margin-top:12px;">
      <div class="control-group">
        <label>Model pricing (April 2026)</label>
        <select id="token-model" onchange="tokenize()">
          <option value="gpt-5-4-pro" data-in="30" data-out="180">OpenAI GPT-5.4 pro ($30.00 / $180.00 per 1M)</option>
          <option value="gpt-5-4-nano" data-in="0.20" data-out="1.25">OpenAI GPT-5.4 nano ($0.20 / $1.25 per 1M)</option>
          <option value="claude-4-6-sonnet" data-in="3.00" data-out="15.00">Claude 4.6 Sonnet ($3.00 / $15.00 per 1M)</option>
          <option value="claude-4-5-haiku" data-in="1.00" data-out="5.00">Claude 4.5 Haiku ($1.00 / $5.00 per 1M)</option>
          <option value="gemini-3-1-pro" data-in="2.00" data-out="12.00">Gemini 3.1 Pro ($2.00 / $12.00 per 1M)</option>
          <option value="gemini-3-1-flash" data-in="0.50" data-out="3.00">Gemini 3.1 Flash ($0.50 / $3.00 per 1M)</option>
          <option value="grok-4-20" data-in="2.00" data-out="6.00">xAI Grok-4.20 ($2.00 / $6.00 per 1M)</option>
          <option value="grok-4-1-fast" data-in="0.20" data-out="0.50">xAI Grok-4.1 Fast ($0.20 / $0.50 per 1M)</option>
        </select>
      </div>
    </div>
    <div class="token-display" id="token-output"></div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-label">Characters</div><div class="stat-value" id="stat-chars">0</div></div>
      <div class="stat-box"><div class="stat-label">Tokens (approx)</div><div class="stat-value" id="stat-tokens">0</div></div>
      <div class="stat-box"><div class="stat-label">Ratio (chars/token)</div><div class="stat-value" id="stat-ratio">0</div></div>
      <div class="stat-box"><div class="stat-label">Input cost</div><div class="stat-value" id="stat-cost">$0.000</div></div>
    </div>
  </div>
</div>

<div class="footer">
  Interactive demos for Generative AI Fundamentals
</div>

<script src="js/tokenizer.js"></script>
</body>
</html>
